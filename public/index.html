<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notiz Benduhn</title>
    <meta name="theme-color" content="#1a73e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="stylesheet" href="./style.css?v=5" />
  </head>
  <body>
    <main class="viewport">
      <textarea
        id="note"
        placeholder="Gedanke festhalten ..."
        aria-label="Notizfeld"
        autofocus
      ></textarea>
      <div id="image-gallery" aria-label="Bilder"></div>
    </main>
    <div class="font-controls" role="group" aria-label="Schriftgröße anpassen">
      <button id="font-decrease" type="button" aria-label="Schrift verkleinern">−</button>
      <button id="font-increase" type="button" aria-label="Schrift vergrößern">+</button>
      <button id="image-upload-btn" type="button" aria-label="Bild hochladen">📎</button>
      <button
        id="note-clear"
        class="clear-button"
        type="button"
        aria-label="Arbeitsblatt leeren"
      >
        CLR
      </button>
    </div>
    <input
      type="file"
      id="image-upload-input"
      accept="image/*"
      multiple
      style="display:none"
      aria-hidden="true"
    />
    <div id="status" data-variant="idle">Bereit.</div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./app.js?v=3"></script>
  </body>
</html>
