<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notiz</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <span class="logo">notiz</span>
    <div class="header-actions">
      <span id="save-status" class="save-status" aria-live="polite"></span>
      <button id="btn-clear" type="button">Leeren</button>
    </div>
  </header>
  <div id="toolbar" role="toolbar" aria-label="Formatierung">
    <button data-action="h1" title="Ueberschrift 1">H1</button>
    <button data-action="h2" title="Ueberschrift 2">H2</button>
    <div class="sep" role="separator"></div>
    <button data-action="bold" title="Fett"><b>B</b></button>
    <button data-action="italic" title="Kursiv"><i>I</i></button>
    <div class="sep" role="separator"></div>
    <button data-action="bullet" title="Aufzaehlung">&#x2261; Liste</button>
    <button data-action="ordered" title="Nummerierte Liste">&#x2460; Numm.</button>
    <div class="sep" role="separator"></div>
    <button data-action="code" title="Code-Block">&lt;/&gt; Code</button>
    <button data-action="image" title="Bild hochladen">&#x1F4CE; Bild</button>
  </div>
  <div id="editor-wrapper">
    <div id="editor"></div>
  </div>
  <footer>
    <span>/ fuer Befehle &middot; Bild per Drag &amp; Drop oder Einf&uuml;gen</span>
    <span id="last-saved"></span>
  </footer>
  <input type="file" id="image-input" accept="image/*" style="display:none" aria-hidden="true">
  <script type="module" src="/app.js"></script>
</body>
</html>
