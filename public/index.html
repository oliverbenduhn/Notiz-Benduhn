<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notiz Benduhn</title>
    <meta name="theme-color" content="#1a73e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./style.css?v=3" />
  </head>
  <body>
    <main class="viewport">
      <textarea
        id="note"
        placeholder="Gedanke festhalten ..."
        aria-label="Notizfeld"
        autofocus
      ></textarea>
    </main>
    <div class="font-controls" role="group" aria-label="Schriftgröße anpassen">
      <button id="font-decrease" type="button" aria-label="Schrift verkleinern">−</button>
      <button id="font-increase" type="button" aria-label="Schrift vergrößern">+</button>
    </div>
    <div id="status" data-variant="idle">Bereit.</div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./app.js?v=2"></script>
  </body>
</html>
