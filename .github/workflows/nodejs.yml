name: CI + Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy auf docker-03 (via VPS Jump-Host)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.50.43
          username: ansible
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.DEPLOY_VPS_HOST }}
          proxy_username: ansible
          proxy_key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /etc/komodo/stacks/notiz-benduhn
            git pull origin main
            docker compose build --no-cache
            docker compose up -d
            echo "Deploy abgeschlossen: $(docker ps --filter name=notiz-benduhn --format '{{.Status}}')"
